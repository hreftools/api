version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries"
    schema: "sql/migrations"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_empty_slices: true
        emit_interface: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
            nullable: false
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "NullUUID"
            nullable: true
          - column: "resources.created_at"
            go_type:
              type: "time.Time"
          - column: "resources.updated_at"
            go_type:
              type: "time.Time"
          - column: "users.created_at"
            go_type:
              type: "time.Time"
          - column: "users.updated_at"
            go_type:
              type: "time.Time"
          - column: "users.email_verification_token_expires_at"
            go_type:
              type: "time.Time"
              pointer: true
          - column: "users.password_reset_token_expires_at"
            go_type:
              type: "time.Time"
              pointer: true
          - column: "sessions.description"
            go_type:
              type: "string"
              pointer: true
          - column: "sessions.expires_at"
            go_type:
              type: "time.Time"
          - column: "sessions.created_at"
            go_type:
              type: "time.Time"
          - column: "sessions.updated_at"
            go_type:
              type: "time.Time"
          - column: "tokens.last_used_at"
            go_type:
              type: "time.Time"
          - column: "tokens.created_at"
            go_type:
              type: "time.Time"
          - column: "tokens.updated_at"
            go_type:
              type: "time.Time"
          - column: "tags.created_at"
            go_type:
              type: "time.Time"
          - column: "tags.updated_at"
            go_type:
              type: "time.Time"
